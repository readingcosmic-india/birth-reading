<!DOCTYPE html>
<html lang="en">
<head>
    <title>Cosmic Reading Pro</title>

<link rel="icon" type="image/svg+xml" href="assets/crystal-ball-svgrepo-com.svg">

<link rel="stylesheet" href="css/style.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cosmic Reading Pro</title>

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/animations.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>

<body>

    <div id="stars"></div>

    <div class="container">

        <div class="glass">

            <!-- Logo -->
            <div class="logo-container">
                <img
                    src="assets/crystal-ball-svgrepo-com.svg"
                    alt="Cosmic Reading Logo"
                    width="100"
                    class="logo">
            </div>

            <!-- Heading -->
            <h1>Cosmic Reading</h1>

            <p>
                Enter your birth details and receive your personalized cosmic reading.
            </p>

            <!-- Form -->
            <form id="readingForm" onsubmit="event.preventDefault(); startReading();">

                <label for="name" style="display:none;">Name</label>
                <input
                    type="text"
                    id="name"
                    placeholder="Your Name (Optional)">

                <label for="dob" style="display:none;">Date of Birth</label>
                <input
                    type="date"
                    id="dob"
                    required>

                <label for="time" style="display:none;">Time of Birth</label>
                <input
                    type="time"
                    id="time"
                    required>

                <label for="place" style="display:none;">Place of Birth</label>
                <input
                    type="text"
                    id="place"
                    placeholder="Place of Birth"
                    required>

                <button type="submit">
                    ✨ Generate Reading
                </button>

            </form>

            <!-- Loading Section -->
            <div id="loading" style="display:none; margin-top:20px;">

                <h2>🔮 Connecting with the Universe...</h2>

                <div class="loader"></div>

                <p id="typing">
                    Reading celestial energies...
                </p>

            </div>

            <!-- Result Section -->
            <div id="result" style="margin-top:20px;"></div>

        </div>

    </div>

    <!-- Load JS after HTML is ready -->
    <script src="./js/app.js"></script>

</body>
</html>
