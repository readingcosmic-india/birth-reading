<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Cosmic Reading Pro</title>

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/animations.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>

<body>

    <div id="stars"></div>

    <div class="container">

        <div class="glass">

            <div class="logo">
                <img src="assets/crystal-ball-svgrepo-com.svg"
                     class="logo"
                     alt="Cosmic Reading Logo"
                     width="100">
            </div>

            <h1>Cosmic Reading</h1>

            <p>
                Enter your birth details and receive your personalized cosmic reading.
            </p>

            <form id="readingForm">

                <input
                    type="text"
                    id="name"
                    placeholder="Your Name (Optional)">

                <input
                    type="date"
                    id="dob"
                    required>

                <input
                    type="time"
                    id="time"
                    required>

                <input
                    type="text"
                    id="place"
                    placeholder="Place of Birth"
                    required>

                <button
                    type="button"
                    onclick="startReading()">

                    ✨ Generate Reading

                </button>

            </form>

            <div id="loading" style="display:none;">

                <h2>🔮 Connecting with the Universe...</h2>

                <div class="loader"></div>

                <p id="typing">
                    Reading celestial energies...
                </p>

            </div>

            <div id="result"></div>

        </div>

    </div>

    <script src="./js/app.js"></script>

</body>

</html>
